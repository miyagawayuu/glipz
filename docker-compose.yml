services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: glipz
      POSTGRES_PASSWORD: glipz_dev
      POSTGRES_DB: glipz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glipz -d glipz"]
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v1/info"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://glipz:glipz_dev@postgres:5432/glipz?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM_EMAIL: no-reply@glipz.local
      SMTP_FROM_NAME: Glipz
      LEGAL_DOCS_DIR: /app/data/legal-docs
    ports:
      - "8080:8080"
    volumes:
      - ./data/media:/app/data/media
      - ./data/legal-docs:/app/data/legal-docs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy

volumes:
  pgdata:
